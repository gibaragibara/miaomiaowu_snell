name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/iluobei/miaomiaowu.git || true
          git fetch upstream

      - name: Check for new upstream changes
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "New upstream changes detected"
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit -m "chore: sync upstream $(date +%Y-%m-%d)"

      - name: Push changes
        if: steps.check.outputs.has_updates == 'true'
        run: git push origin main
