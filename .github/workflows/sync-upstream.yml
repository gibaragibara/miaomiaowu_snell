name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/iluobei/miaomiaowu.git || true
          git fetch --no-tags upstream main:refs/remotes/upstream/main

      - name: Check for new upstream changes
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "New upstream changes detected"
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git merge upstream/main --no-edit -m "chore: sync upstream $(date +%Y-%m-%d)"; then
            exit 0
          fi

          conflicts=$(git diff --name-only --diff-filter=U)
          if [ -z "$conflicts" ]; then
            git status --short
            exit 1
          fi

          for conflict in $conflicts; do
            case "$conflict" in
              internal/version/version.go|miaomiaowu/src/hooks/use-version-check.ts)
                ;;
              *)
                echo "Unexpected merge conflict: $conflict"
                git status --short
                exit 1
                ;;
            esac
          done

          python3 <<'PY'
          from pathlib import Path
          import re

          Path("internal/version/version.go").write_text(
              'package version\n\n// Version is the current application version\nvar Version = "dev"\n'
          )

          path = Path("miaomiaowu/src/hooks/use-version-check.ts")
          text = path.read_text()
          text = re.sub(
              r"<<<<<<< HEAD\nconst CURRENT_VERSION = 'dev'\n=======\nconst CURRENT_VERSION = '[^']+'\n>>>>>>> upstream/main\n",
              "const CURRENT_VERSION = 'dev'\n",
              text,
          )
          path.write_text(text)
          PY

          if grep -n -E '^(<<<<<<<|=======|>>>>>>>)' internal/version/version.go miaomiaowu/src/hooks/use-version-check.ts; then
            exit 1
          fi

          git add internal/version/version.go miaomiaowu/src/hooks/use-version-check.ts
          remaining=$(git diff --name-only --diff-filter=U)
          if [ -n "$remaining" ]; then
            echo "$remaining"
            exit 1
          fi
          git commit --no-edit

      - name: Push changes
        if: steps.check.outputs.has_updates == 'true'
        run: git push origin main

      - name: Auto tag and release
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.7.0"
          else
            # Strip 'v' prefix, split by '.', bump patch
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Creating tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
